<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ONVIF Network Camera Manager</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link href="style.css" rel="stylesheet" />
    <script type="module" src="./index.ts"></script>
  </head>
  <body>
    <div class="container theme-showcase" role="main" id="main-wrapper">
      <form class="form-horizontal" id="connect-form">
        <div class="form-group">
          <label for="device" class="col-sm-2 control-label">Device</label>
          <div class="col-sm-10">
            <select class="form-control" id="device" name="device" disabled>
              <option>now searching...</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="user" class="col-sm-2 control-label">User</label>
          <div class="col-sm-10">
            <input class="form-control" id="user" name="user" type="text" autocomplete="username" />
          </div>
        </div>
        <div class="form-group">
          <label for="pass" class="col-sm-2 control-label">Password</label>
          <div class="col-sm-10">
            <input class="form-control" id="pass" name="pass" type="password" autocomplete="current-password" />
          </div>
        </div>
        <button
          type="button"
          class="form-control btn btn-primary"
          name="connect"
          disabled
        >
          Connect
        </button>
      </form>

      <div id="connected-device">
        <button type="button" class="btn btn-default btn-sm hide-controls-btn" title="Hide/Show Controls">
          <span class="icon">Hide</span>
        </button>
        <button type="button" class="btn btn-default btn-sm hide-controls-btn-2 ptz-goto-home">
          <span class="icon">Home</span>
        </button>

        <p><img class="snapshot" src="" /></p>
        <div class="device-info-box">
          <span class="name"></span> (<span class="address"></span>)
          <div class="stream-controls">
            <div class="btn-group btn-group-sm stream-mode-btns" data-toggle="buttons">
              <label class="btn btn-default active" title="Snapshot mode (lower bandwidth)">
                <input type="radio" name="stream-mode" value="snapshot" checked /> Snapshot
              </label>
              <label class="btn btn-default" title="MJPEG stream (smoother video)">
                <input type="radio" name="stream-mode" value="mjpeg" /> MJPEG
              </label>
            </div>
            <button type="button" class="btn btn-default btn-sm show-streams-btn" title="Show Stream URLs">
              <span class="icon">Links</span>
            </button>
          </div>
        </div>
        <div class="ptz-ctl-box">
          <div class="ptz-pad-box">
            <button type="button" class="ptz-goto-home">
              <span class="icon">Home</span>
            </button>
            <span class="left icon">◀</span>
            <span class="right icon">▶</span>
            <span class="up icon">▲</span>
            <span class="down icon">▼</span>
          </div>
        </div>
        <div class="ptz-spd-ctl-box">
          <span class="label">PTZ speed for keyboard</span>
          <div class="btn-group btn-group-sm" data-toggle="buttons">
            <label class="btn btn-default"
              ><input type="radio" name="ptz-speed" value="0.5" /> slow</label
            >
            <label class="btn btn-default"
              ><input type="radio" name="ptz-speed" value="0.75" />
              medium</label
            >
            <label class="btn btn-default active"
              ><input type="radio" name="ptz-speed" value="1.0" checked />
              fast</label
            >
          </div>
        </div>
        <div
          class="ptz-zom-ctl-box btn-group btn-group-lg"
          role="group"
          aria-label="Zoom"
        >
          <button type="button" class="ptz-zom ptz-zom-ot btn btn-default">
            <span class="icon">-</span>
          </button>
          <button type="button" class="ptz-zom ptz-zom-in btn btn-default">
            <span class="icon">+</span>
          </button>
        </div>
        <div class="disconnect-box">
          <button
            type="button"
            class="form-control btn btn-default"
            name="disconnect"
          >
            Disconnect
          </button>
        </div>
      </div>
    </div>

    <div class="modal fade" tabindex="-1" role="dialog" id="message-modal">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <button
              type="button"
              class="close"
              data-dismiss="modal"
              aria-label="Close"
            >
              <span aria-hidden="true">&times;</span>
            </button>
            <h4 class="modal-title"></h4>
          </div>
          <div class="modal-body">
            <p class="modal-message"></p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-default" data-dismiss="modal">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" tabindex="-1" role="dialog" id="streams-modal">
      <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
            <h4 class="modal-title">Stream URLs</h4>
          </div>
          <div class="modal-body">
            <p class="text-muted">Use these URLs in VLC, ffmpeg, or other media players:</p>
            <div class="stream-urls-list">
              <div class="form-group">
                <label>RTSP Stream:</label>
                <div class="input-group">
                  <input type="text" class="form-control stream-url-rtsp" readonly />
                  <span class="input-group-btn">
                    <button class="btn btn-default copy-url-btn" type="button" data-target=".stream-url-rtsp">
                      <span class="icon">Copy</span>
                    </button>
                  </span>
                </div>
              </div>
              <div class="form-group">
                <label>MJPEG Stream (Browser):</label>
                <div class="input-group">
                  <input type="text" class="form-control stream-url-mjpeg" readonly />
                  <span class="input-group-btn">
                    <button class="btn btn-default copy-url-btn" type="button" data-target=".stream-url-mjpeg">
                      <span class="icon">Copy</span>
                    </button>
                  </span>
                </div>
              </div>
              <div class="form-group">
                <label>Snapshot URL:</label>
                <div class="input-group">
                  <input type="text" class="form-control stream-url-snapshot" readonly />
                  <span class="input-group-btn">
                    <button class="btn btn-default copy-url-btn" type="button" data-target=".stream-url-snapshot">
                      <span class="icon">Copy</span>
                    </button>
                  </span>
                </div>
              </div>
              <div class="form-group">
                <label>HTTP Stream:</label>
                <div class="input-group">
                  <input type="text" class="form-control stream-url-http" readonly />
                  <span class="input-group-btn">
                    <button class="btn btn-default copy-url-btn" type="button" data-target=".stream-url-http">
                      <span class="icon">Copy</span>
                    </button>
                  </span>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
